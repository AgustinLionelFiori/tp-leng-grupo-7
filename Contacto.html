<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Conecta Futuro</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
         <link rel="stylesheet" href="css/estilos.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
<body>
  <header class="encabezado">
        <div class="container d-flex flex-column flex-lg-row align-items-center justify-content-between p-3 ">
            <!--Modo flexible cuando es mayor a > 992px esta en horizontal pero si es menor se pone en columnas -->

            <!-- Logo y textos -->
            <div class="d-flex align-items-center gap-3">
                <img src="./Imagenes/logoConectar.png" alt="Logo de Conectar" width="100" loading="lazy" class="logo">

                <div>
                    <h1>Conectar Futuro</h1>
                    <p>Tecnología y aprendizaje</p>
                </div>
            </div>

            <!-- Menu -->
            <nav class="navbar d-flex flex-column flex-md-row">
                <ul class="navbar-nav flex-column flex-md-row gap-3">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="./index.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="./nosotros.html">Nosotros</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="./programas.html">Programas</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="#">Contacto</a>
                    </li>
                </ul>
                    <button class="modo-oscuro" id="btn-modo-oscuro">🌙</button>
            </nav>
</header>

    <main>
        <section class="container my-5">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4 p-4">

                <h2 class="text-center mb-3">🙌 Sumate como voluntari@</h2>

                <p class="text-center text-muted mb-4">
                    Completá el formulario o escribinos a
                    <a href="mailto:info@conectarFuturo.org.ar">
                        info@conectarFuturo.org.ar
                    </a>
                </p>

                <form action="#" method="post">

                    <div class="mb-3">
                        <label for="nombre" class="form-label">
                            Nombre y Apellido
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            placeholder="Ej: Marcos Capo"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            Correo electrónico
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            placeholder="Ej: marcoscapo123@gmail.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">
                            Teléfono
                        </label>

                        <input
                            type="tel"
                            class="form-control"
                            id="telefono"
                            name="telefono"
                            placeholder="+54 9 11-1234-5678"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="programa" class="form-label">
                            Programa de interés
                        </label>

                        <select class="form-select" id="programa" required>
                            <option selected disabled>Elegir programa...</option>
                            <option>Alfabetización Digital</option>
                            <option>Primer Empleo</option>
                            <option>Ciudadanía Digital Segura</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="mensaje" class="form-label">
                            Contanos por qué querés sumarte
                        </label>

                        <textarea
                            class="form-control"
                            id="mensaje"
                            rows="5"
                            placeholder="Me gustaría unirme porque..."></textarea>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg" type="submit">
                            Enviar solicitud
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

    </main>
    <footer class="bg-secondary p-3 d-flex justify-content-center"><small>Conectar Futuro Copyright © 2026</small></footer>
    <script src="js/main.js"></script>
</body>
</html>
