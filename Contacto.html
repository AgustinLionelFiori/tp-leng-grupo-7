<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FundAr - Educación digital para todos</title>
    </head>
<body>
     <header>
         <img src="./Logo FundAr.jpg" alt="Logo de FundAr" >
        <h1>FundAr</h1>
        <h2>Educación digital para comunidades que más lo necesitan</h2>

        <nav>
            <ul>
                <li><a href="./Index.html">Inicio</a></li>
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./programas.html">Programas</a></li>
                <li><a href="./Contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Sumate como voluntari@</h2>
        <p>Completa el formulario o escribinos a: <a href="mailto:info@fundar.org.ar">info@fundar.org.ar</a></p>
        <form action="#" method="post">
            <label for="nombre">Nombre y Apellido:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Marcos Capo" required>
            <br>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="Ej: marcoscapo123@gmail.com" required>
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: +54 9 11-1234-5678" required>
            <br>
            <label for="programa">Programa de interés:</label>
            <select id="programa" name="programa" required>
                <option value="">Elegir programa...</option>
                <option value="plc">Primeras Líneas de Código</option>
                <option value="met">Mujeres en Tecnología</option>
                <option value="ec">Escuelas Conectadas</option>
            </select>
            <br>
            <label for="mensaje">Contanos porque queres sumarte!:</label>
            <textarea name="mensaje" id="mensaje" rows="12" placeholder="Me gustaria unírme porque..."></textarea>
            <br>
            <button type="submit">Enviar</button>
        </form>
    </main>
    <footer>
         <p><small>FundAr Copyright © 2026</small></p>
    </footer>
